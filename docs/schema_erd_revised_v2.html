
<style>
#erd { padding: 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram

  users {
    uuid id PK
    string username
    string email
    string password_hash
    string name
    timestamp created_at
    timestamp updated_at
  }

  user_bans {
    uuid id PK
    uuid user_id FK
    uuid banned_by FK
    string reason
    timestamp expires_at
    timestamp created_at
  }

  streamers {
    uuid id PK
    uuid user_id FK
    string bio
    string stream_key
    boolean is_verified
    timestamp created_at
  }

  categories {
    uuid id PK
    string name
    string slug
    uuid parent_id FK
    string thumbnail_url
  }

  streams {
    uuid id PK
    uuid streamer_id FK
    uuid category_id FK
    string title
    string rtmp_url
    string hls_url
    boolean is_live
    timestamp started_at
    timestamp ended_at
    timestamp created_at
  }

  follows {
    uuid follower_id PK
    uuid streamer_id PK
    timestamp created_at
  }

  subscription_tiers {
    uuid id PK
    string name
    integer price_cents
    string description
  }

  subscriptions {
    uuid id PK
    uuid user_id FK
    uuid streamer_id FK
    uuid tier_id FK
    timestamp expires_at
    timestamp created_at
  }

  chat_messages {
    uuid id PK
    uuid stream_id FK
    uuid user_id FK
    string content
    boolean is_deleted
    timestamp created_at
  }

  donations {
    uuid id PK
    uuid user_id FK
    uuid streamer_id FK
    uuid stream_id FK
    integer amount_cents
    string currency
    string message
    string status
    timestamp created_at
  }

  vods {
    uuid id PK
    uuid stream_id FK
    uuid streamer_id FK
    string title
    string video_url
    string thumbnail_url
    integer duration_seconds
    boolean is_public
    timestamp created_at
  }

  vod_views {
    uuid id PK
    uuid vod_id FK
    uuid user_id FK
    integer watch_duration_seconds
    timestamp watched_at
  }

  stream_views {
    uuid id PK
    uuid stream_id FK
    uuid user_id FK
    integer watch_duration_seconds
    timestamp watched_at
  }

  users ||--o{ user_bans : "can be banned"
  users ||--|| streamers : "can become"
  streamers ||--o{ streams : "creates"
  categories ||--o{ streams : "contains"
  categories ||--o{ categories : "parent"
  users ||--o{ follows : "follows"
  streamers ||--o{ follows : "is followed"
  subscription_tiers ||--o{ subscriptions : "defines"
  users ||--o{ subscriptions : "subscribes"
  streamers ||--o{ subscriptions : "receives"
  users ||--o{ chat_messages : "writes"
  streams ||--o{ chat_messages : "has"
  streamers ||--o{ vods : "owns"
  streams ||--o{ vods : "generates"
  vods ||--o{ vod_views : "viewed in"
  users ||--o{ donations : "sends"
  streamers ||--o{ donations : "receives"
  streams ||--o{ donations : "gets"
  users ||--o{ stream_views : "watches"
  streams ||--o{ stream_views : "viewed"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
