services:
  redis:
    image: redis:7-alpine
    container_name: streaming-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      REDIS_URL: redis://redis:6379
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - redis
    command: ["node", "dist/main.js"]
