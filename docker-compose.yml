services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    command: ["node", "dist/main.js"]
